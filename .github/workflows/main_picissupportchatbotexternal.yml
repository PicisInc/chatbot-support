name: Build and deploy Python app to Azure Web App - PicisSupportChatbotExternal

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # Checkout latest code
      - name: Checkout repository
        uses: actions/checkout@v4

      # (Optional) Set up Python - only useful if you want pre-checks
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # (Optional) Install dependencies to catch issues early
      - name: Install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      # Login to Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7AF7514234554E89B362637E66519C7E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_29BF8EA45A2B4A0DAE90E59A9336A547 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E17C8AD5AEB1411C8FFF58DFF5B26881 }}

      # Deploy directly from repo (no artifacts)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'PicisSupportChatbotExternal'
          slot-name: 'Production'
          package: .
